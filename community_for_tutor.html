<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Community Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
      /* General Page Styles */
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #f4f4f4;
      }

      /* Center the content */
      .container {
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
      }

      /* Chat Section Styles */
      .chat-section {
        background: white;
        border-radius: 10px;
        padding: 20px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }

      h2 {
        text-align: center;
        color: #333;
      }

      /* Chat Container */
      .chat-container {
        max-height: 400px;
        overflow-y: scroll;
        margin-bottom: 20px;
        border: 1px solid #ddd;
        border-radius: 10px;
        padding: 10px;
        background-color: #f9f9f9;
      }

      /* Individual Chat Messages */
      .chat-message {
        margin-bottom: 15px;
        padding: 10px;
        border-radius: 5px;
        background-color: #e6e6e6;
        color: #333;
      }

      .chat-message a {
        color: #1e90ff;
        text-decoration: none;
      }

      .chat-message a:hover {
        text-decoration: underline;
      }

      .chat-message img {
        width: 150px;
        height: 150px;
        object-fit: cover;
        border-radius: 8px;
        margin-top: 5px;
      }

      /* Input and Buttons */
      .chat-input,
      .file-upload {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 20px;
      }

      .chat-input input {
        width: 80%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 5px;
      }

      .chat-input button,
      .file-upload button {
        padding: 10px 15px;
        background-color: #4caf50;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }

      .chat-input button:hover,
      .file-upload button:hover {
        background-color: #45a049;
      }

      .file-upload input[type="file"] {
        width: 80%;
      }

      /* Style for File Upload Section */
      .file-upload {
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="chat-section">
        <h2>Community Chat</h2>

        <!-- Chat Messages Container -->
        <div id="chatMessages" class="chat-container"></div>

        <!-- Message Input -->
        <div class="chat-input">
          <input
            type="text"
            id="messageInput"
            placeholder="Type your message..."
          />
          <button onclick="sendMessage()">Send</button>
        </div>

        <!-- File Upload -->
        <div class="file-upload">
          <input type="file" id="fileInput" />
          <button onclick="uploadFile()">Upload File</button>
        </div>
      </div>
    </div>

    <script>
      // Function to extract community ID from URL
      function getCommunityId() {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get("communityId");
      }

      // Function to get tutor ID and Name from session storage
      function getTutorData() {
        const storedData = sessionStorage.getItem("tutorDetails");
        if (!storedData) {
          alert("Session expired. Redirecting to login.");
          window.location.href = "loginpage.html"; // Redirect to login
          return null;
        }
        return JSON.parse(storedData); // Returns {Tutor_ID, Tutor_Name}
      }

      // Function to send a message
      function sendMessage() {
        const tutorData = getTutorData();
        const communityId = getCommunityId();
        if (!tutorData || !communityId) return;

        const message = document.getElementById("messageInput").value; // Get the message input value

        if (!message.trim()) {
          alert("Message cannot be empty");
          return;
        }

        const role = "tutor"; // Set role to tutor for message sending

        axios
          .post("/api/community/chat", {
            userId: tutorData.Tutor_ID,
            communityId,
            message,
            role,
          })
          .then((response) => {
            // Append the new text message to the chat container
            appendMessageToChat(
              message,
              "text",
              tutorData.Tutor_Name,
              role
            );
            document.getElementById("messageInput").value = ""; // Clear the input field
          })
          .catch((error) => {
            console.error("Error sending message:", error);
            alert("An error occurred while sending the message.");
          });
      }

      // Function to upload a file
      function uploadFile() {
        const tutorData = getTutorData();
        const communityId = getCommunityId();
        if (!tutorData || !communityId) return;

        const file = document.getElementById("fileInput").files[0]; // Get the selected file

        if (!file) {
          alert("Please select a file to upload");
          return;
        }

        const formData = new FormData();
        formData.append("file", file);
        formData.append("userId", tutorData.Tutor_ID); // Use Tutor_ID for file upload
        formData.append("communityId", communityId);
        formData.append("role", "tutor"); // Role is tutor

        axios
          .post("/api/community/upload", formData, {
            headers: { "Content-Type": "multipart/form-data" },
          })
          .then((response) => {
            // Append the uploaded file to the chat container
            appendMessageToChat(
              response.data.fileUrl,
              "file",
              tutorData.Tutor_Name,
              "tutor"
            );
          })
          .catch((error) => {
            console.error("Error uploading file:", error);
            alert("An error occurred while uploading the file.");
          });
      }

      // Append Message Function
      function appendMessageToChat(content, type, senderName, senderRole) {
        const chatContainer = document.getElementById("chatMessages");
        const messageElement = document.createElement("div");
        messageElement.classList.add("chat-message");

        const roleTag = senderRole === "tutor" ? "(Tutor)" : "(Student)"; // Adjust role tag

        if (type === "text") {
          messageElement.innerHTML = `<strong>${senderName} ${roleTag}:</strong> ${content}`;
        } else if (type === "file") {
          const fileType = content.split(".").pop().toLowerCase();

          if (["jpg", "jpeg", "png", "gif"].includes(fileType)) {
            messageElement.innerHTML = `<strong>${senderName} ${roleTag}:</strong><br><img src="${content}" alt="Image">`;
          } else if (fileType === "pdf") {
            messageElement.innerHTML = `<strong>${senderName} ${roleTag}:</strong><br><a href="${content}" target="_blank">View PDF</a>`;
          } else {
            messageElement.innerHTML = `<strong>${senderName} ${roleTag}:</strong><br><a href="${content}" target="_blank">View File</a>`;
          }
        }

        chatContainer.appendChild(messageElement);
        chatContainer.scrollTop = chatContainer.scrollHeight;
      }

      // Fetch messages and files for the community when the page loads
      window.onload = function () {
        const communityId = getCommunityId();
        if (!communityId) return;

        axios
          .get(`/api/community/chat-and-files/${communityId}`)
          .then((response) => {
            const messages = response.data;
            messages.forEach((item) => {
              if (item.type === "message") {
                appendMessageToChat(
                  item.message,
                  "text",
                  item.sender_name,
                  item.sender_role
                );
              } else if (item.type === "file") {
                appendMessageToChat(
                  item.file_url,
                  "file",
                  item.sender_name,
                  item.sender_role
                );
              }
            });
          })
          .catch((error) => {
            console.error("Error fetching messages:", error);
          });
      };
    </script>
  </body>
</html>
