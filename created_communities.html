<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Created Communities</title>
    <style>
        /* Inline styling for demonstration; move to styles.css */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f6f9;
            color: #333;
        }

        .main-content {
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #007BFF;
            color: #fff;
            padding: 5px 10px;
            height: 50px;
        }

        header h2 {
            margin: 0;
            font-size: 18px;
            display: flex;
            align-items: center;
        }

        .menu-icon {
            cursor: pointer;
            margin-right: 10px;
            height: 24px;
            width: auto;
        }

        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        #communitiesList {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .community-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background-color: #f9f9f9;
            transition: box-shadow 0.3s;
        }

        .community-item:hover {
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
        }

        .community-item h3 {
            margin: 0;
            font-size: 18px;
            color: #007BFF;
        }

        .community-item p {
            margin: 5px 0;
            color: #555;
        }

        .community-item button {
            padding: 8px 16px;
            font-size: 14px;
            color: #fff;
            background-color: #007BFF;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .community-item button:hover {
            background-color: #0056b3;
        }

        .no-communities {
            text-align: center;
            color: #888;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="main-content">
        <header>
            <h2>
                <label for="nav-toggle">
                    <img src="images/bluebar2.png" alt="Menu Icon" class="menu-icon">
                </label>
                Created Communities
            </h2>
        </header>
        <main>
            <div class="container">
                <div id="communitiesList">
                    <!-- Communities will be displayed here -->
                </div>
            </div>
        </main>
    </div>

    <script>
        // Fetch communities for the logged-in tutor
        const tutorDetails = JSON.parse(sessionStorage.getItem('tutorDetails'));
        if (!tutorDetails || !tutorDetails.Tutor_ID) {
            alert("Tutor details missing. Please log in again.");
            window.location.href = 'login.html'; // Redirect to login if details are missing
        } else {
            fetch('/get-communities', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ tutorId: tutorDetails.Tutor_ID })
            })
                .then(response => response.json())
                .then(data => {
                    const communities = data.communities || [];
                    const communitiesList = document.getElementById('communitiesList');

                    if (communities.length > 0) {
                        communities.forEach(community => {
                            const communityItem = document.createElement('div');
                            communityItem.classList.add('community-item');
                            communityItem.innerHTML = `
                                <div>
                                    <h3>${community.name}</h3>
                                    <p><strong>Status:</strong> ${community.status}</p>
                                    <p>${community.description || "No description provided."}</p>
                                </div>
                                <button onclick="redirectToCommunity('${community.id}')">View Community</button>
                            `;
                            communitiesList.appendChild(communityItem);
                        });
                    } else {
                        communitiesList.innerHTML = `<p class="no-communities">No communities found.</p>`;
                    }
                })
                .catch(error => console.error('Error fetching communities:', error));
        }

        // Redirect to community.html with the selected community ID
        function redirectToCommunity(communityId) {
            window.location.href = `community_for_tutor.html?communityId=${communityId}`;
        }
    </script>
</body>
</html>
